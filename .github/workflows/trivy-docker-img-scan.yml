name: Docker Build and Trivy Scan

on:
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Prepare for Docker Build
        id: prepare
        uses: ./.github/actions/prepare-for-docker-build
        with:
          image: openmetadata/server
          tag: trivy

      - name: Build Docker Image
        run: |
          docker build -t openmetadata/server:trivy -f docker/development/Dockerfile .
        
      - name: Run Trivy Image Scan
        id: trivy_scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "openmetadata/server:trivy"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          output: "trivy-results.txt"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
    
      - name: Format Trivy Output
        run: |
          # Check for vulnerabilities in the output
          if grep -q "HIGH\|CRITICAL" trivy-results.txt; then
            echo "## 🚨 Trivy Security Scan Results 🚨" > trivy-results.md
            echo "" >> trivy-results.md
            echo "### 🔴 Found HIGH and CRITICAL vulnerabilities:" >> trivy-results.md
            echo '```' >> trivy-results.md
            cat trivy-results.txt >> trivy-results.md
            echo '```' >> trivy-results.md
            exit 1  # Fail the job if vulnerabilities are found
          fi

      - name: Comment Trivy Scan Results on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: trivy-results.md